<link rel="shortcut icon" type="image/x-icon" href="https://nateonweb.nate.com/favicon.ico">
<link rel="apple-touch-icon" href="https://nateonweb.nate.com/img/Appleicon_nateon_200x200.png">
<title>네이트온</title>
<style>
  @font-face {
    font-family: 'Pretendard Variable';
    src: url('https://nateonweb.nate.com/menu/font/PretendardVariable.woff2') format('woff2-variations');
    font-weight: 45 920;
    font-style: normal;
    font-display: swap;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system,
                 BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI',
                 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    color: #333;
    background-color: #5079EE;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -1px;
    overflow-x: hidden;
  }

  /* page */
  .page {
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    background-image:
      url('https://nateonweb.nate.com/menu/img/main/2024/nateon_mobile_main_visual.webp'),
      linear-gradient(180deg, #5079EE 0%, #F9FAFB 100%);
    background-repeat: no-repeat;
    background-position: 50% 0;
    background-size: cover;
    padding: 64px 16px 32px;
    display: flex;
    flex-direction: column;
  }

  /* header (로고만, outLink 제외) */
  .header {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    padding: 16px 24px 12px;
    box-sizing: border-box;
    z-index: 10;
  }
  .header .logo {
    display: block;
    width: 80px;
    height: 28px;
    background-image: url('https://nateonweb.nate.com/menu/img/main/2024/img_nateonlogo_white.png');
    background-repeat: no-repeat;
    background-position: 0 0;
    background-size: contain;
    text-indent: -9999px;
    overflow: hidden;
  }

  /* contents */
  .contents {
    width: 100%;
    max-width: 375px;
    margin: 0 auto;
    padding-top: 100px;
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .tit {
    color: #FFF;
    text-align: center;
    font-size: 28px;
    font-weight: 300;
    line-height: 38px;
    letter-spacing: -1px;
  }

  /* primary CTA — 네이트온 바로 열기 (수동 fallback) */
  .open-app {
    display: block;
    width: 100%;
    max-width: 343px;
    margin: 40px auto 0;
    padding: 0;
    border: 0;
    border-radius: 10px;
    background: #FFFFFF;
    color: #5079EE;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    line-height: 54px;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(40, 60, 120, 0.18);
    transition: transform 0.1s ease, background 0.15s ease;
  }
  .open-app:active { transform: scale(0.98); background: #F1F4FF; }

  /* download buttons (원본 디자인 동일) */
  .downlink {
    width: 100%;
    max-width: 343px;
    margin: 16px auto 0;
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 12px 8px;
    justify-content: center;
  }
  .downlink a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: calc(50% - 4px);
    line-height: 48px;
    text-align: center;
    color: #000;
    font-size: 14px;
    font-weight: 700;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.60);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    text-decoration: none;
    transition: background 0.15s ease;
  }
  .downlink a:active { background: rgba(255, 255, 255, 0.88); }
  .downlink a span {
    display: inline-block;
    padding-left: 32px;
    position: relative;
  }
  .downlink a span::before {
    content: '';
    display: block;
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    background-repeat: no-repeat;
    background-position: 0 0;
    background-size: auto 100%;
  }
  .downlink a.win span::before { background-image: url('https://nateonweb.nate.com/menu/img/main/2024/window.png'); }
  .downlink a.mac span::before { background-image: url('https://nateonweb.nate.com/menu/img/main/2024/macOs.png'); }
  .downlink a.and span::before { background-image: url('https://nateonweb.nate.com/menu/img/main/2024/google.png'); }
  .downlink a.ios span::before { background-image: url('https://nateonweb.nate.com/menu/img/main/2024/apple.png'); }

  /* 모바일: Windows/Mac 숨김 (원본과 동일) */
  .downlink a.win, .downlink a.mac { display: none; }

  /* loading (작게, 다운로드 버튼 아래) */
  .loading {
    margin-top: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-top-color: #FFF;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    color: #FFF;
    font-size: 13px;
    font-weight: 500;
    opacity: 0.92;
  }
  .hidden { display: none !important; }

  /* desktop */
  @media (min-width: 1100px) {
    body { min-width: 1100px; }
    .page {
      height: 800px;
      min-height: 800px;
      background-image:
        url('https://nateonweb.nate.com/menu/img/main/2024/nateon_web_main_visual.webp'),
        linear-gradient(180deg, #5079EE 0%, #F9FAFB 100%);
      background-size: auto 100%, auto;
      background-position: 100% 0, 0 0;
      padding: 0;
      justify-content: center;
    }
    .header { padding: 24px; }
    .header .logo { width: 96px; height: 32px; }
    .contents {
      max-width: 1100px;
      padding: 0;
      justify-content: center;
      align-items: center;
      flex: 1;
    }
    .tit { font-size: 60px; line-height: 74px; }
    .downlink {
      width: 372px;
      max-width: none;
      margin: 20px auto 0;
      gap: 16px 12px;
    }
    .open-app {
      max-width: 372px;
      line-height: 60px;
      font-size: 17px;
      margin-top: 48px;
    }
    .downlink a {
      width: 180px;
      line-height: 54px;
      font-size: 16px;
    }
    .downlink a.win, .downlink a.mac { display: flex; }
    .loading { margin-top: 36px; }
    .loading-text { font-size: 14px; }
  }
</style>
</head>
<body>
  <div class="page">
    <header class="header">
      <span class="logo" aria-label="네이트온">네이트온</span>
    </header>

    <main class="contents">
      <h1 class="tit">오롯이 대화에 집중.<br>네이트온</h1>

      <button type="button" class="open-app" id="openAppBtn">네이트온 바로 열기</button>

      <div class="downlink">
        <a href="//br.nate.com/index.php?code=F085" class="win" target="_blank" rel="noopener noreferrer"><span>Windows</span></a>
        <a href="//br.nate.com/index.php?code=F065" class="mac" target="_blank" rel="noopener noreferrer"><span>Mac OS</span></a>
        <a href="https://play.google.com/store/apps/details?id=Uxpp.UC&amp;hl=ko" class="and" target="_blank" rel="noopener noreferrer"><span>Google Play</span></a>
        <a href="https://itunes.apple.com/kr/app/nateon/id362693357?mt=8" class="ios" target="_blank" rel="noopener noreferrer"><span>App Store</span></a>
      </div>

      <div class="loading" id="loading">
        <div class="spinner" id="spinner"></div>
        <div class="loading-text" id="desc">잠시 후 자동으로 이동됩니다</div>
      </div>
    </main>
  </div>

<script>
(function () {
  // ===== 설정 =====
  var APP_SCHEME      = 'nateonuc://';
  var ANDROID_PACKAGE = 'Uxpp.UC';
  var ANDROID_STORE   = 'https://play.google.com/store/apps/details?id=' + ANDROID_PACKAGE + '&hl=ko';
  var IOS_STORE       = 'https://apps.apple.com/kr/app/id362693357';
  var FALLBACK_DELAY  = 1500; // ms
  // ================

  var ua        = navigator.userAgent || '';
  var isAndroid = /android/i.test(ua);
  var isIOS     = /iPhone|iPad|iPod/i.test(ua) && !window.MSStream;
  var isKakao   = /KAKAOTALK/i.test(ua);
  var isLine    = /Line\//i.test(ua);
  var isFB      = /(FBAN|FBAV|Instagram)/i.test(ua);
  var isInApp   = isKakao || isLine || isFB;

  var spinnerEl = document.getElementById('spinner');
  var descEl    = document.getElementById('desc');
  var openBtnEl = document.getElementById('openAppBtn');

  var pageHidden = false;
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) pageHidden = true;
  });
  window.addEventListener('pagehide', function () { pageHidden = true; });
  window.addEventListener('blur',     function () { pageHidden = true; });

  function showDesktopGuide() {
    if (spinnerEl) spinnerEl.classList.add('hidden');
    if (descEl)    descEl.innerHTML = '모바일에서 접속하면 앱이 자동으로 실행됩니다';
    if (openBtnEl) openBtnEl.classList.add('hidden');
  }

  function showInAppGuide() {
    if (spinnerEl) spinnerEl.classList.add('hidden');
    if (descEl)    descEl.innerHTML = '우측 상단 메뉴에서 "외부 브라우저로 열기"를 선택해주세요';
  }

  // 쿠팡 방식 deeplink 호출: 단순 스킴 호출 + timestamp 기반 fallback
  // setTimeout이 백그라운드 진입 시 지연되는 특성을 이용해 visibility API 없이도 정확히 동작
  function deeplinkRedirect(scheme, fallbackUrl) {
    var ts = Date.now();
    var maxDrift = 2 * FALLBACK_DELAY; // 이 시간 이상 지났으면 백그라운드 다녀온 것 → fallback 금지

    // 1) 직접 스킴 호출
    window.location.href = scheme;

    // 2) 일정 시간 후에도 페이지가 살아있으면 스토어로
    setTimeout(function () {
      if ((Date.now() - ts) >= maxDrift) return; // 타이머가 너무 늦게 발화 = 앱이 열렸다 돌아옴
      if (pageHidden || document.hidden) return; // 페이지가 백그라운드 = 앱 실행됨
      window.location.replace(fallbackUrl);
    }, FALLBACK_DELAY);
  }

  function tryOpenApp() {
    if (isAndroid) {
      deeplinkRedirect(APP_SCHEME, ANDROID_STORE);
    } else if (isIOS) {
      deeplinkRedirect(APP_SCHEME, IOS_STORE);
    } else {
      showDesktopGuide();
    }
  }

  // 수동 "네이트온 열기" 버튼: 사용자 제스처라서 차단되지 않음 (가장 확실한 호출)
  if (openBtnEl) {
    openBtnEl.addEventListener('click', function (e) {
      e.preventDefault();
      pageHidden = false;
      tryOpenApp();
    });
  }

  // 인앱 브라우저
  if (isInApp && (isAndroid || isIOS)) {
    showInAppGuide();
    return;
  }
  // 데스크탑
  if (!isAndroid && !isIOS) {
    showDesktopGuide();
    return;
  }

  // 자동 실행 (페이지 진입 즉시)
  function start() { tryOpenApp(); }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
</body>
</html>
